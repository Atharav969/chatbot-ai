<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXA AI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>

:root {
  --cyan: #00f5ff;
  --purple: #7c3aed;
  --pink: #f000b8;
  --bg: #03040f;
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.1);
  --user-bubble: linear-gradient(135deg,#0ea5e9,#6366f1);
  --bot-bubble: rgba(255,255,255,0.06);
  --text: #e2e8f0;
  --muted: rgba(255,255,255,0.4);
}

*{margin:0;padding:0;box-sizing:border-box;}

html,body{
  width:100%;height:100%;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ── BACKGROUND ── */
.bg{
  position:fixed;inset:0;z-index:0;overflow:hidden;
  pointer-events:none;
}
.noise{
  position:absolute;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:0.03;
}
.orb{
  position:absolute;border-radius:50%;
  filter:blur(100px);animation:drift 14s ease-in-out infinite alternate;
}
.o1{width:500px;height:500px;background:rgba(0,245,255,0.12);top:-150px;left:-150px;animation-delay:0s;}
.o2{width:450px;height:450px;background:rgba(124,58,237,0.18);bottom:-180px;right:-120px;animation-delay:-5s;}
.o3{width:300px;height:300px;background:rgba(240,0,184,0.1);top:50%;left:50%;transform:translate(-50%,-50%);animation-delay:-9s;}
@keyframes drift{
  from{transform:translateY(-30px) translateX(-30px) scale(1);}
  to{transform:translateY(30px) translateX(30px) scale(1.05);}
}

/* ── GRID LINES ── */
.grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(0,245,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,245,255,0.04) 1px, transparent 1px);
  background-size:60px 60px;
}

/* ── INTRO ── */
#intro{
  position:fixed;inset:0;z-index:9999;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--bg);
  animation:introOut 0.8s ease forwards;
  animation-delay:3.2s;
}
.intro-logo{
  font-family:'Syne',sans-serif;
  font-size:clamp(3rem,10vw,7rem);
  font-weight:800;
  letter-spacing:0.15em;
  background:linear-gradient(120deg,var(--cyan) 0%,var(--purple) 50%,var(--pink) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:logoIn 0.9s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity:0;transform:translateY(30px);
}
.intro-sub{
  margin-top:14px;
  font-size:0.75rem;
  letter-spacing:0.4em;
  color:var(--muted);
  text-transform:uppercase;
  animation:logoIn 0.9s cubic-bezier(0.16,1,0.3,1) 0.25s forwards;
  opacity:0;transform:translateY(20px);
}
.intro-bar{
  margin-top:40px;
  width:160px;height:2px;
  background:rgba(255,255,255,0.1);
  border-radius:99px;overflow:hidden;
  animation:logoIn 0.6s ease 0.5s forwards;
  opacity:0;
}
.intro-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--cyan),var(--purple));
  animation:barFill 2.4s ease 0.8s forwards;
}
@keyframes logoIn{to{opacity:1;transform:translateY(0);}}
@keyframes barFill{to{width:100%;}}
@keyframes introOut{to{opacity:0;visibility:hidden;pointer-events:none;}}

/* ── LAYOUT ── */
.shell{
  position:relative;z-index:1;
  width:100%;height:100vh;
  display:flex;justify-content:center;align-items:center;
  padding:16px;
}

.chatbox{
  width:100%;max-width:880px;
  height:92vh;
  display:flex;flex-direction:column;
  background:rgba(10,12,30,0.7);
  backdrop-filter:blur(40px) saturate(1.5);
  -webkit-backdrop-filter:blur(40px) saturate(1.5);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:28px;
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(0,245,255,0.06),
    0 40px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.08);
  animation:boxIn 1s cubic-bezier(0.16,1,0.3,1) 3.2s both;
}
@keyframes boxIn{
  from{opacity:0;transform:translateY(40px) scale(0.97);}
  to{opacity:1;transform:translateY(0) scale(1);}
}

/* ── TOPBAR ── */
.topbar{
  padding:18px 24px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.02);
  flex-shrink:0;
}
.tb-left{display:flex;align-items:center;gap:14px;}
.avatar{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;box-shadow:0 0 16px rgba(0,245,255,0.3);
}
.brand{
  font-family:'Syne',sans-serif;
  font-weight:800;font-size:1.3rem;
  letter-spacing:0.05em;
  background:linear-gradient(90deg,var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.brand-tag{
  font-size:0.65rem;letter-spacing:0.2em;
  color:var(--muted);text-transform:uppercase;
  font-weight:400;-webkit-text-fill-color:rgba(255,255,255,0.4);
}
.tb-right{display:flex;align-items:center;gap:16px;}
.status-dot{
  display:flex;align-items:center;gap:7px;
  font-size:0.75rem;color:#34d399;letter-spacing:0.05em;
}
.dot{
  width:7px;height:7px;border-radius:50%;background:#34d399;
  box-shadow:0 0 8px #34d399;
  animation:pulse 2s ease infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;}
  50%{opacity:0.4;}
}
.clear-btn{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--muted);
  padding:6px 14px;border-radius:10px;
  font-size:0.75rem;cursor:pointer;
  transition:all 0.2s;font-family:'DM Sans',sans-serif;
}
.clear-btn:hover{background:rgba(255,0,100,0.15);color:#f87171;border-color:rgba(248,113,113,0.3);}

/* ── MESSAGES ── */
.messages{
  flex:1;overflow-y:auto;
  padding:24px;
  display:flex;flex-direction:column;gap:16px;
  scroll-behavior:smooth;
}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-track{background:transparent;}
.messages::-webkit-scrollbar-thumb{background:rgba(0,245,255,0.2);border-radius:99px;}

/* ── MESSAGE BUBBLE ── */
.msg-row{
  display:flex;align-items:flex-end;gap:10px;
  animation:msgIn 0.35s cubic-bezier(0.16,1,0.3,1);
}
@keyframes msgIn{
  from{opacity:0;transform:translateY(14px);}
  to{opacity:1;transform:translateY(0);}
}
.msg-row.user{flex-direction:row-reverse;}

.msg-avatar{
  width:30px;height:30px;border-radius:10px;
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:0.8rem;
}
.msg-avatar.bot-av{
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  box-shadow:0 0 12px rgba(0,245,255,0.25);
}
.msg-avatar.user-av{
  background:linear-gradient(135deg,#0ea5e9,#6366f1);
}

.bubble{
  max-width:72%;
  padding:14px 18px;
  border-radius:20px;
  line-height:1.7;
  font-size:0.92rem;
  position:relative;
  word-break:break-word;
}
.bubble.bot{
  background:var(--bot-bubble);
  border:1px solid rgba(255,255,255,0.08);
  border-bottom-left-radius:6px;
  color:var(--text);
}
.bubble.user{
  background:var(--user-bubble);
  border-bottom-right-radius:6px;
  color:#fff;
}
.bubble.bot::before{
  content:'';
  position:absolute;inset:0;
  border-radius:inherit;
  background:linear-gradient(135deg,rgba(0,245,255,0.04),transparent);
  pointer-events:none;
}

/* ── TIMESTAMP ── */
.msg-meta{
  font-size:0.65rem;color:var(--muted);
  margin-top:4px;
  padding:0 4px;
}
.msg-row.user .msg-meta{text-align:right;}

/* ── THINKING ANIMATION ── */
.thinking{display:flex;gap:5px;align-items:center;padding:4px 0;}
.thinking span{
  width:7px;height:7px;border-radius:50%;
  background:var(--cyan);
  animation:bounce 1.2s ease infinite;
}
.thinking span:nth-child(2){animation-delay:0.15s;background:var(--purple);}
.thinking span:nth-child(3){animation-delay:0.3s;background:var(--pink);}
@keyframes bounce{
  0%,60%,100%{transform:translateY(0);opacity:0.5;}
  30%{transform:translateY(-8px);opacity:1;}
}

/* ── STREAMING CURSOR ── */
.cursor{
  display:inline-block;
  width:2px;height:1em;
  background:var(--cyan);
  margin-left:2px;
  vertical-align:text-bottom;
  animation:blink 0.8s steps(1) infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

/* ── SUGGESTIONS ── */
.suggestions{
  display:flex;flex-wrap:wrap;gap:8px;
  padding:0 24px 16px;
}
.sug{
  padding:8px 16px;
  border:1px solid rgba(0,245,255,0.2);
  border-radius:99px;
  font-size:0.78rem;color:var(--cyan);
  cursor:pointer;background:rgba(0,245,255,0.05);
  transition:all 0.2s;white-space:nowrap;
  font-family:'DM Sans',sans-serif;
}
.sug:hover{background:rgba(0,245,255,0.12);border-color:var(--cyan);transform:translateY(-1px);}

/* ── INPUT ── */
.input-wrap{
  padding:16px 20px;
  border-top:1px solid rgba(255,255,255,0.07);
  background:rgba(255,255,255,0.02);
  flex-shrink:0;
}
.input-row{
  display:flex;gap:12px;align-items:flex-end;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:10px 10px 10px 18px;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.input-row:focus-within{
  border-color:rgba(0,245,255,0.35);
  box-shadow:0 0 0 3px rgba(0,245,255,0.08);
}
#prompt{
  flex:1;
  background:transparent;
  border:none;outline:none;
  color:var(--text);
  font-size:0.95rem;
  font-family:'DM Sans',sans-serif;
  resize:none;
  max-height:120px;
  line-height:1.5;
}
#prompt::placeholder{color:var(--muted);}
.send-btn{
  width:42px;height:42px;border-radius:13px;
  border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--cyan),var(--purple));
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  transition:all 0.2s;
  box-shadow:0 0 16px rgba(0,245,255,0.2);
}
.send-btn:hover{transform:scale(1.07);box-shadow:0 0 24px rgba(0,245,255,0.4);}
.send-btn:active{transform:scale(0.95);}
.send-btn svg{width:18px;height:18px;fill:white;}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}

.char-count{
  font-size:0.65rem;color:var(--muted);
  text-align:right;margin-top:6px;padding:0 6px;
}

/* ── MOBILE ── */
@media(max-width:640px){
  .shell{padding:10px;}
  .chatbox{height:96vh;border-radius:20px;}
  .bubble{max-width:88%;}
  .brand-tag,.clear-btn{display:none;}
  .suggestions{padding:0 16px 12px;}
  .sug{font-size:0.72rem;padding:6px 12px;}
}
</style>
</head>
<body>

<!-- BG -->
<div class="bg">
  <div class="noise"></div>
  <div class="grid"></div>
  <div class="orb o1"></div>
  <div class="orb o2"></div>
  <div class="orb o3"></div>
</div>

<!-- INTRO -->
<div id="intro">
  <div class="intro-logo">NEXA</div>
  <div class="intro-sub">Next-Gen AI Interface</div>
  <div class="intro-bar"><div class="intro-bar-fill"></div></div>
</div>

<!-- CHAT -->
<div class="shell">
  <div class="chatbox">

    <div class="topbar">
      <div class="tb-left">
        <div class="avatar">⚡</div>
        <div>
          <div class="brand">NEXA AI</div>
          <div class="brand-tag">Powered by AI</div>
        </div>
      </div>
      <div class="tb-right">
        <div class="status-dot"><div class="dot"></div>Online</div>
        <button class="clear-btn" onclick="clearChat()">Clear Chat</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="msg-row">
        <div class="msg-avatar bot-av">⚡</div>
        <div>
          <div class="bubble bot">
            Hey there! 👋 I'm <strong>NEXA</strong> — your intelligent AI assistant.<br><br>
            Ask me anything. I'm ready to help.
          </div>
          <div class="msg-meta" id="welcome-time"></div>
        </div>
      </div>
    </div>

    <div class="suggestions" id="suggestions">
      <div class="sug" onclick="useSuggestion(this)">✨ What can you do?</div>
      <div class="sug" onclick="useSuggestion(this)">🌐 Explain the internet</div>
      <div class="sug" onclick="useSuggestion(this)">💡 Give me a fun fact</div>
      <div class="sug" onclick="useSuggestion(this)">🚀 Write a short poem</div>
    </div>

    <div class="input-wrap">
      <div class="input-row">
        <textarea id="prompt" placeholder="Ask anything…" rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
      </div>
      <div class="char-count" id="char-count">0 / 2000</div>
    </div>

  </div>
</div>

<script>
const ENDPOINT = "https://36c0-103-198-98-40.ngrok-free.app/chat";
const msgContainer = document.getElementById("messages");
const promptEl = document.getElementById("prompt");
const sendBtn = document.getElementById("send-btn");
const charCount = document.getElementById("char-count");
const sugContainer = document.getElementById("suggestions");

let isLoading = false;

// Welcome time
document.getElementById("welcome-time").textContent = formatTime(new Date());

// Auto-resize textarea
promptEl.addEventListener("input", () => {
  promptEl.style.height = "auto";
  promptEl.style.height = Math.min(promptEl.scrollHeight, 120) + "px";
  const len = promptEl.value.length;
  charCount.textContent = `${len} / 2000`;
  charCount.style.color = len > 1800 ? "#f87171" : "rgba(255,255,255,0.3)";
});

// Enter to send (Shift+Enter for newline)
promptEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function formatTime(d) {
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function hideSuggestions() {
  sugContainer.style.display = "none";
}

function useSuggestion(el) {
  promptEl.value = el.textContent.replace(/^[\p{Emoji}\s]+/u, "").trim();
  hideSuggestions();
  promptEl.focus();
}

function clearChat() {
  msgContainer.innerHTML = "";
  sugContainer.style.display = "flex";
  addBotMessage("Chat cleared. How can I help you? 👋");
}

function scrollBottom() {
  msgContainer.scrollTo({ top: msgContainer.scrollHeight, behavior: "smooth" });
}

function addUserMessage(text) {
  const row = document.createElement("div");
  row.className = "msg-row user";
  row.innerHTML = `
    <div class="msg-avatar user-av">👤</div>
    <div>
      <div class="bubble user">${escapeHTML(text)}</div>
      <div class="msg-meta">${formatTime(new Date())}</div>
    </div>`;
  msgContainer.appendChild(row);
  scrollBottom();
}

function addBotMessage(text) {
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `
    <div class="msg-avatar bot-av">⚡</div>
    <div>
      <div class="bubble bot">${text}</div>
      <div class="msg-meta">${formatTime(new Date())}</div>
    </div>`;
  msgContainer.appendChild(row);
  scrollBottom();
  return row;
}

function addThinkingBubble() {
  const row = document.createElement("div");
  row.className = "msg-row";
  row.innerHTML = `
    <div class="msg-avatar bot-av">⚡</div>
    <div>
      <div class="bubble bot">
        <div class="thinking"><span></span><span></span><span></span></div>
      </div>
    </div>`;
  msgContainer.appendChild(row);
  scrollBottom();
  return row;
}

function escapeHTML(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

// Streaming text renderer
function streamText(bubble, fullText, onDone) {
  bubble.innerHTML = "";
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  bubble.appendChild(cursor);

  let i = 0;
  const speed = Math.max(12, Math.min(35, Math.floor(3000 / fullText.length)));

  function type() {
    if (i < fullText.length) {
      const ch = fullText[i];
      cursor.insertAdjacentText("beforebegin", ch === "\n" ? "" : ch);
      if (ch === "\n") cursor.insertAdjacentHTML("beforebegin", "<br>");
      i++;
      scrollBottom();
      setTimeout(type, speed);
    } else {
      cursor.remove();
      if (onDone) onDone();
    }
  }
  type();
}

async function sendMessage() {
  if (isLoading) return;
  const text = promptEl.value.trim();
  if (!text) return;

  hideSuggestions();
  isLoading = true;
  sendBtn.disabled = true;
  promptEl.value = "";
  promptEl.style.height = "auto";
  charCount.textContent = "0 / 2000";

  addUserMessage(text);
  const thinkRow = addThinkingBubble();

  try {
    const res = await fetch(ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "minimax-m2.5:cloud", prompt: text, stream: false })
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const reply = data.response || data.message || data.text || "No response received.";

    thinkRow.remove();

    // Create bot row with empty bubble, then stream into it
    const row = document.createElement("div");
    row.className = "msg-row";
    const metaDiv = document.createElement("div");
    metaDiv.className = "msg-meta";
    metaDiv.textContent = formatTime(new Date());
    const bubble = document.createElement("div");
    bubble.className = "bubble bot";
    const avDiv = document.createElement("div");
    avDiv.className = "msg-avatar bot-av";
    avDiv.textContent = "⚡";
    const inner = document.createElement("div");
    inner.appendChild(bubble);
    inner.appendChild(metaDiv);
    row.appendChild(avDiv);
    row.appendChild(inner);
    msgContainer.appendChild(row);

    streamText(bubble, reply, () => {
      isLoading = false;
      sendBtn.disabled = false;
      promptEl.focus();
    });

  } catch (err) {
    thinkRow.remove();
    addBotMessage("⚠️ Couldn't reach the AI server. Please check the connection and try again.");
    isLoading = false;
    sendBtn.disabled = false;
    console.error(err);
  }
}
</script>
</body>
</html>
