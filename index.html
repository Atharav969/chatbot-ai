<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXA AI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Poppins',sans-serif;
    background:#050816;
    color:white;
}

/* =========================
BACKGROUND
========================= */

.bg{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-10;
}

.circle{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    animation:float 10s infinite alternate;
}

.c1{
    width:400px;
    height:400px;
    background:#00f7ff55;
    top:-100px;
    left:-100px;
}

.c2{
    width:350px;
    height:350px;
    background:#7b2dff66;
    bottom:-120px;
    right:-100px;
}

.c3{
    width:250px;
    height:250px;
    background:#ff00aa44;
    top:40%;
    left:40%;
}

@keyframes float{
    from{
        transform:translateY(-20px) translateX(-20px);
    }
    to{
        transform:translateY(20px) translateX(20px);
    }
}

/* =========================
INTRO
========================= */

#intro{
    position:fixed;
    width:100%;
    height:100%;
    background:#050816;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
    flex-direction:column;
    animation:fadeOut 1.5s ease forwards;
    animation-delay:3.5s;
}

.logo{
    font-size:5rem;
    font-family:'Orbitron',sans-serif;
    letter-spacing:10px;
    background:linear-gradient(90deg,#00f7ff,#8a2be2,#ff00aa);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    animation:glow 2s infinite alternate;
}

.tagline{
    margin-top:20px;
    opacity:0.8;
    font-size:1rem;
    letter-spacing:3px;
}

@keyframes glow{
    from{
        text-shadow:0 0 20px #00f7ff;
    }
    to{
        text-shadow:0 0 40px #8a2be2;
    }
}

@keyframes fadeOut{
    to{
        opacity:0;
        visibility:hidden;
    }
}

/* =========================
CHAT CONTAINER
========================= */

.container{
    width:100%;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.chatbox{
    width:100%;
    max-width:950px;
    height:90vh;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:30px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    box-shadow:0 0 50px rgba(0,255,255,0.15);
    animation:appear 2s ease;
}

@keyframes appear{
    from{
        transform:translateY(40px);
        opacity:0;
    }
    to{
        transform:translateY(0px);
        opacity:1;
    }
}

.topbar{
    padding:20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    border-bottom:1px solid rgba(255,255,255,0.1);
}

.brand{
    font-size:1.7rem;
    font-family:'Orbitron',sans-serif;
    background:linear-gradient(90deg,#00f7ff,#8a2be2);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.status{
    font-size:0.9rem;
    color:#00ff99;
}

/* =========================
MESSAGES
========================= */

.messages{
    flex:1;
    padding:25px;
    overflow-y:auto;
    display:flex;
    flex-direction:column;
    gap:18px;
}

.message{
    max-width:75%;
    padding:18px;
    border-radius:20px;
    animation:msg 0.4s ease;
    line-height:1.6;
}

@keyframes msg{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0px);
    }
}

.user{
    align-self:flex-end;
    background:linear-gradient(135deg,#00c6ff,#0072ff);
    color:white;
}

.bot{
    align-self:flex-start;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);
}

/* =========================
INPUT AREA
========================= */

.input-area{
    display:flex;
    padding:20px;
    gap:15px;
    border-top:1px solid rgba(255,255,255,0.1);
}

.input-area input{
    flex:1;
    padding:18px;
    border:none;
    outline:none;
    border-radius:18px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:1rem;
}

.input-area button{
    padding:18px 28px;
    border:none;
    border-radius:18px;
    background:linear-gradient(135deg,#00f7ff,#8a2be2);
    color:white;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.input-area button:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00f7ff66;
}

/* =========================
SCROLLBAR
========================= */

.messages::-webkit-scrollbar{
    width:6px;
}

.messages::-webkit-scrollbar-thumb{
    background:#00f7ff88;
    border-radius:20px;
}

/* =========================
MOBILE
========================= */

@media(max-width:700px){

.logo{
    font-size:3rem;
}

.chatbox{
    height:95vh;
    border-radius:20px;
}

.message{
    max-width:90%;
}

.input-area{
    flex-direction:column;
}

.input-area button{
    width:100%;
}

}

</style>
</head>
<body>

<div class="bg">
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
</div>

<!-- INTRO -->
<div id="intro">
    <div class="logo">NEXA</div>
    <div class="tagline">THE FUTURE OF AI</div>
</div>

<!-- CHAT -->
<div class="container">

    <div class="chatbox">

        <div class="topbar">
            <div class="brand">NEXA AI</div>
            <div class="status">● ONLINE</div>
        </div>

        <div class="messages" id="messages">

            <div class="message bot">
                Hello 👋<br><br>
                I am NEXA AI.<br>
                How can I help you today?
            </div>

        </div>

        <div class="input-area">
            <input type="text" id="prompt" placeholder="Ask anything...">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script>

const endpoint = "https://2b4c-103-198-98-40.ngrok-free.app/chat";

const messages = document.getElementById("messages");

function addMessage(text, type){

    const div = document.createElement("div");

    div.className = `message ${type}`;

    div.innerHTML = text;

    messages.appendChild(div);

    messages.scrollTop = messages.scrollHeight;
}

async function sendMessage(){

    const input = document.getElementById("prompt");

    const text = input.value.trim();

    if(!text) return;

    addMessage(text,"user");

    input.value = "";

    const loading = document.createElement("div");

    loading.className = "message bot";

    loading.innerHTML = "✨ Thinking...";

    messages.appendChild(loading);

    messages.scrollTop = messages.scrollHeight;

    try{

        const response = await fetch(endpoint,{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                model:"minimax-m2.5:cloud",
                prompt:text,
                stream:false
            })

        });

        const data = await response.json();

        loading.remove();

        addMessage(data.response || "No response","bot");

    }catch(error){

        loading.remove();

        addMessage("⚠️ Connection error with AI server.","bot");

        console.error(error);
    }

}

document.getElementById("prompt")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
